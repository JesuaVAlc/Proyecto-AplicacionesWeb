<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego</title>
    <style>
      /* Reseteo básico para que el canvas ocupe toda la pantalla sin scroll */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* El canvas de Phaser se inyecta aquí */
      #game-container {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <!-- Punto de entrada de Vite -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
